version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # If you set up a domain or different IP for EC2, update this variable
      - NEXT_PUBLIC_API_URL=http://${EC2_PUBLIC_IP:-localhost}:8000
