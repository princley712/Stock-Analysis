services:
  - type: web
    name: stockpulse-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -c "import nltk; nltk.download('vader_lexicon')"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
